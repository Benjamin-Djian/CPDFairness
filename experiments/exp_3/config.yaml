experiment:
  seed: 42
  save:
    dataset: true
    histogram: true
    likelihood: true
    model: true

data:
  dataset: adult
  sens_attr: sex
  train_split: 0.6
  valid_split: 0.2
  batch_size: 64

preprocessing:
  class_balance:
    downsampling: false
    upsampling: false
  fairness:
    correlation_remover: false
    disparate_impact_remover: false

model:
  input_dim: 103
  layers:
    hidden_dims: [ 256, 256 ]
    dropout: 0.5
  activation:
    type: leaky_relu
    neg_slope: 0.01

training:
  learning_rate: 0.001
  epochs: 100
  use_class_weight: false
