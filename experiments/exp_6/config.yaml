experiment:
  seed: 42
  save_hist: true
  save_likelihood: true
  save_model: true

data:
  name: adult
  sens_attr: sex
  prop_train: 0.6
  prop_valid: 0.2
  batch_size: 64

model:
  input_dim: 103
  hidden_dims:
    - 256
    - 256
    - 256
  neg_slope: 0.01
  dropout: 0.5

training:
  learning_rate: 0.001
  epochs: 100
  class_weight: false
